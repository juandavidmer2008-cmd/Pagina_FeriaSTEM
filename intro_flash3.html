<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feria STEM 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: #000008; display: flex; align-items: center; justify-content: center; cursor: pointer; }

    canvas#space { position: fixed; inset: 0; z-index: 0; }

    .nebula { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 1; }

    #flash-bg {
      position: fixed; inset: 0; z-index: 2;
      background: #000008;
      animation: flashBg 0.8s ease-out 0.5s forwards;
    }
    @keyframes flashBg {
      0%   { background: #000008; }
      20%  { background: #1a3a8a; }
      40%  { background: #2f5cff; }
      60%  { background: #0a1a4a; }
      100% { background: transparent; }
    }

    #logo-wrap {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    #logo-img {
      width: clamp(220px, 38vw, 420px);
      opacity: 0;
      transform: scale(1.4);
      filter: brightness(5) blur(8px);
      transition: none;
    }
    #logo-img.flash {
      transition: opacity 0.15s ease, transform 0.4s cubic-bezier(0.22,1,0.36,1), filter 0.5s ease;
      opacity: 1;
      transform: scale(1);
      filter: brightness(1) drop-shadow(0 0 60px rgba(47,92,255,0.9)) drop-shadow(0 0 120px rgba(91,125,255,0.5));
    }
    #logo-img.settle {
      filter: brightness(1) drop-shadow(0 0 30px rgba(47,92,255,0.6));
      transition: filter 1s ease;
    }

    /* Ondas */
    .wave {
      position: fixed;
      top: 50%; left: 50%;
      width: 10px; height: 10px;
      margin: -5px 0 0 -5px;
      border: 2px solid rgba(47,92,255,0.9);
      border-radius: 50%;
      z-index: 9;
      opacity: 0;
    }
    .wave.go { animation: waveOut 1.2s ease-out forwards; }
    @keyframes waveOut {
      0%   { transform: scale(1);  opacity: .9; border-color: rgba(255,255,255,0.9); }
      30%  { opacity: .7; border-color: rgba(91,125,255,0.8); }
      100% { transform: scale(80); opacity: 0; border-color: rgba(47,92,255,0); }
    }

    #tagline {
      margin-top: 1.6rem;
      font-family: 'Exo', sans-serif;
      font-size: clamp(0.55rem, 1.1vw, 0.8rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: transparent;
      transition: color 0.8s ease;
    }
    #tagline.show { color: rgba(138,163,255,0.85); }

    #fecha {
      margin-top: 0.4rem;
      font-family: 'Exo', sans-serif;
      font-size: clamp(0.45rem, 0.9vw, 0.65rem);
      letter-spacing: 0.35em;
      color: transparent;
      transition: color 0.8s ease 0.3s;
    }
    #fecha.show { color: rgba(91,125,255,0.6); }

    #fadeout {
      position: fixed; inset: 0; z-index: 99;
      background: #000008;
      opacity: 0; pointer-events: none;
      transition: opacity 0.7s ease;
    }
    #fadeout.out { opacity: 1; }
  </style>
</head>
<body>

<canvas id="space"></canvas>
<div class="nebula" style="width:60rem;height:60rem;top:-30%;right:-20%;background:rgba(47,92,255,0.08)"></div>
<div class="nebula" style="width:50rem;height:50rem;bottom:-25%;left:-15%;background:rgba(99,40,255,0.07)"></div>
<div class="nebula" style="width:30rem;height:30rem;top:20%;left:10%;background:rgba(0,180,255,0.04)"></div>

<div id="flash-bg"></div>

<div class="wave" id="w1"></div>
<div class="wave" id="w2"></div>
<div class="wave" id="w3"></div>
<div class="wave" id="w4"></div>

<div id="logo-wrap">
  <img id="logo-img" src="logoferia1.png" alt="Feria STEM 2026">
  <p id="tagline">Ciencia · Tecnología · Ingeniería · Matemáticas</p>
  <p id="fecha">2ª edición · CBA Santa Cruz · 30 de junio de 2026</p>
</div>

<div id="fadeout"></div>

<script>
(function(){
  'use strict';

  /* ── Stars ── */
  const cvs = document.getElementById('space');
  const ctx = cvs.getContext('2d');
  function resize(){ cvs.width = innerWidth; cvs.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const stars = Array.from({length:200}, () => ({
    x: Math.random()*4000, y: Math.random()*3000,
    r: Math.random()*1.5+0.2,
    ph: Math.random()*Math.PI*2,
    sp: Math.random()*0.008+0.003,
    warm: Math.random() > 0.8
  }));

  const shoots = [];
  function addShoot(){
    shoots.push({ x: Math.random()*cvs.width, y: Math.random()*cvs.height*0.5,
      len: Math.random()*130+60, sp: Math.random()*8+5, op: 1,
      angle: Math.PI/4 + (Math.random()-0.5)*0.3 });
  }

  let tick = 0;
  (function loop(){
    tick++;
    ctx.clearRect(0,0,cvs.width,cvs.height);
    for(const s of stars){
      const a = (Math.sin(tick*s.sp+s.ph)*0.4+0.6)*0.85;
      ctx.beginPath();
      ctx.arc(s.x%cvs.width, s.y%cvs.height, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.warm ? `rgba(200,210,255,${a})` : `rgba(255,255,255,${a})`;
      ctx.fill();
    }
    for(let i=shoots.length-1;i>=0;i--){
      const s=shoots[i];
      ctx.save();
      ctx.globalAlpha=s.op;
      ctx.strokeStyle='rgba(180,210,255,0.9)';
      ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(s.x,s.y);
      ctx.lineTo(s.x-Math.cos(s.angle)*s.len, s.y-Math.sin(s.angle)*s.len);
      ctx.stroke();
      ctx.restore();
      s.x+=Math.cos(s.angle)*s.sp;
      s.y+=Math.sin(s.angle)*s.sp;
      s.op-=0.022;
      if(s.op<=0) shoots.splice(i,1);
    }
    requestAnimationFrame(loop);
  })();
  setInterval(addShoot, 2000);
  setTimeout(addShoot, 600);

  /* ── Flash + ondas + logo ── */
  const img     = document.getElementById('logo-img');
  const tagline = document.getElementById('tagline');
  const fecha   = document.getElementById('fecha');
  const fadeout = document.getElementById('fadeout');
  const waves   = [document.getElementById('w1'), document.getElementById('w2'),
                   document.getElementById('w3'), document.getElementById('w4')];

  /* Logo flash a 0.5 seg */
  setTimeout(() => img.classList.add('flash'), 500);

  /* Ondas escalonadas desde 0.5 seg */
  waves.forEach((w, i) => {
    setTimeout(() => w.classList.add('go'), 500 + i * 180);
  });

  /* Logo se asienta */
  setTimeout(() => img.classList.add('settle'), 1000);

  /* Tagline */
  setTimeout(() => tagline.classList.add('show'), 1200);

  /* Fecha */
  setTimeout(() => fecha.classList.add('show'), 1600);

  /* Fade out a 3.8 seg */
  setTimeout(() => fadeout.classList.add('out'), 3800);

  /* Redirige */
  setTimeout(() => { window.location.href = 'index.html'; }, 4500);

  /* Skip */
  function skip(){
    fadeout.classList.add('out');
    setTimeout(() => { window.location.href = 'index.html'; }, 700);
  }
  document.addEventListener('click', skip);
  document.addEventListener('keydown', e => {
    if(['Space','Enter','Escape'].includes(e.code)) skip();
  });

})();
</script>
</body>
</html>
