<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feria STEM 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; height: 100vh;
      overflow: hidden;
      background: #000008;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    canvas#space { position: fixed; inset: 0; z-index: 0; }

    /* Nebula glows */
    .nebula {
      position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none; z-index: 1;
    }

    /* Logo container */
    #logo-wrap {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }

    /* Ferrari-style: logo starts invisible, slides+fades in */
    #logo-img {
      width: clamp(220px, 38vw, 420px);
      opacity: 0;
      transform: translateY(30px) scale(0.92);
      transition: opacity 1.1s cubic-bezier(0.22,1,0.36,1),
                  transform 1.1s cubic-bezier(0.22,1,0.36,1),
                  filter 1.1s ease;
      filter: brightness(0) invert(1);
    }

    #logo-img.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: brightness(1) invert(0) drop-shadow(0 0 40px rgba(47,92,255,0.5));
    }

    #logo-img.glow {
      filter: brightness(1) invert(0)
              drop-shadow(0 0 60px rgba(47,92,255,0.8))
              drop-shadow(0 0 120px rgba(91,125,255,0.4));
    }

    /* Tagline */
    #tagline {
      margin-top: 1.8rem;
      font-family: 'Exo', sans-serif;
      font-size: clamp(0.6rem, 1.2vw, 0.85rem);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: transparent;
      transition: color 1s ease;
    }
    #tagline.show { color: rgba(138,163,255,0.85); }

    /* Fecha */
    #fecha {
      margin-top: 0.5rem;
      font-family: 'Exo', sans-serif;
      font-size: clamp(0.5rem, 1vw, 0.7rem);
      letter-spacing: 0.35em;
      color: transparent;
      transition: color 1s ease 0.3s;
    }
    #fecha.show { color: rgba(91,125,255,0.6); }

    /* Fade out overlay */
    #fadeout {
      position: fixed; inset: 0; z-index: 99;
      background: #000008;
      opacity: 0; pointer-events: none;
      transition: opacity 0.7s ease;
    }
    #fadeout.out { opacity: 1; }
  </style>
</head>
<body>

<canvas id="space"></canvas>

<!-- Nebulas de color -->
<div class="nebula" style="width:60rem;height:60rem;top:-30%;right:-20%;background:rgba(47,92,255,0.08)"></div>
<div class="nebula" style="width:50rem;height:50rem;bottom:-25%;left:-15%;background:rgba(99,40,255,0.07)"></div>
<div class="nebula" style="width:30rem;height:30rem;top:20%;left:10%;background:rgba(0,180,255,0.05)"></div>

<div id="logo-wrap">
  <img id="logo-img" src="logoferia1.png" alt="Feria STEM 2026">
  <p id="tagline">Ciencia · Tecnología · Ingeniería · Matemáticas</p>
  <p id="fecha">2ª edición · CBA Santa Cruz · 30 de junio de 2026</p>
</div>

<div id="fadeout"></div>

<script>
(function(){
  'use strict';

  /* ── Space canvas ── */
  const cvs = document.getElementById('space');
  const ctx = cvs.getContext('2d');

  function resize(){
    cvs.width  = window.innerWidth;
    cvs.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* Stars */
  const STAR_COUNT = 220;
  const stars = Array.from({length: STAR_COUNT}, () => ({
    x: Math.random() * 4000,
    y: Math.random() * 3000,
    r: Math.random() * 1.6 + 0.2,
    ph: Math.random() * Math.PI * 2,
    sp: Math.random() * 0.008 + 0.003,
    color: Math.random() > 0.85
      ? `rgba(180,200,255,`
      : `rgba(255,255,255,`
  }));

  /* Shooting stars */
  const shoots = [];
  function addShoot(){
    shoots.push({
      x: Math.random() * cvs.width,
      y: Math.random() * cvs.height * 0.5,
      len: Math.random() * 120 + 60,
      sp: Math.random() * 8 + 6,
      op: 1,
      angle: Math.PI / 4 + (Math.random() - 0.5) * 0.3
    });
  }

  let tick = 0;
  function loop(){
    tick++;
    ctx.clearRect(0, 0, cvs.width, cvs.height);

    /* Stars */
    for(const s of stars){
      const a = (Math.sin(tick * s.sp + s.ph) * 0.4 + 0.6) * 0.9;
      ctx.beginPath();
      ctx.arc(s.x % cvs.width, s.y % cvs.height, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.color + a + ')';
      ctx.fill();
    }

    /* Shooting stars */
    for(let i = shoots.length-1; i >= 0; i--){
      const s = shoots[i];
      ctx.save();
      ctx.globalAlpha = s.op;
      ctx.strokeStyle = 'rgba(180,210,255,0.9)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - Math.cos(s.angle)*s.len, s.y - Math.sin(s.angle)*s.len);
      ctx.stroke();
      ctx.restore();
      s.x += Math.cos(s.angle) * s.sp;
      s.y += Math.sin(s.angle) * s.sp;
      s.op -= 0.025;
      if(s.op <= 0) shoots.splice(i,1);
    }

    requestAnimationFrame(loop);
  }
  loop();

  /* Shooting star interval */
  setInterval(addShoot, 2200);
  setTimeout(addShoot, 800);

  /* ── Ferrari-style logo sequence ── */
  const img      = document.getElementById('logo-img');
  const tagline  = document.getElementById('tagline');
  const fecha    = document.getElementById('fecha');
  const fadeout  = document.getElementById('fadeout');

  /* 1. Logo aparece (Ferrari style) después de 400ms */
  setTimeout(() => img.classList.add('visible'), 400);

  /* 2. Glow intenso */
  setTimeout(() => img.classList.add('glow'), 1200);

  /* 3. Tagline aparece */
  setTimeout(() => tagline.classList.add('show'), 1600);

  /* 4. Fecha aparece */
  setTimeout(() => fecha.classList.add('show'), 2000);

  /* 5. Fade out a los 4 segundos */
  setTimeout(() => fadeout.classList.add('out'), 3800);

  /* 6. Redirige a index.html */
  setTimeout(() => { window.location.href = 'index.html'; }, 4600);

  /* Skip con clic o tecla */
  function skip(){
    fadeout.classList.add('out');
    setTimeout(() => { window.location.href = 'index.html'; }, 700);
  }
  document.addEventListener('click', skip);
  document.addEventListener('keydown', e => {
    if(['Space','Enter','Escape'].includes(e.code)) skip();
  });

})();
</script>
</body>
</html>
