<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feria STEM 2026 — Presentación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo:wght@700;800;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #2f5cff;
      --blue-light: #5b7dff;
      --blue-dim: #8aa3ff;
      --bg: #050b1d;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Roboto Mono', monospace;
      color: white;
    }

    /* ── Background grid ── */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(91,125,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,125,255,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Radial glows ── */
    .glow {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
    }

    /* ── Stars canvas ── */
    #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Main intro container ── */
    #intro {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── Logo stage: container for all fragment pieces ── */
    #stage {
      position: relative;
      width: min(88vw, 580px);
      height: min(40.7vw, 264px);
      container-type: inline-size;
      transition: filter 0.9s ease;
    }

    #stage.glowing {
      filter:
        drop-shadow(0 0 28px rgba(47, 92, 255, 0.75))
        drop-shadow(0 0 80px rgba(47, 92, 255, 0.35));
    }

    /* ── Each fragment piece ── */
    .piece {
      position: absolute; inset: 0;
      will-change: transform, opacity;
      opacity: 0;
      /* clip-path and transform set by JS */
    }

    /* ── Logo content inside each piece (identical, clip does the selection) ── */
    .logo-inner {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      user-select: none; pointer-events: none;
    }

    .logo-row1 {
      display: flex;
      align-items: baseline;
      gap: 0.2em;
      line-height: 1;
    }

    .logo-feria {
      font-family: 'Exo', sans-serif;
      font-weight: 900;
      font-size: 14cqi;
      color: var(--blue);
      letter-spacing: 0.01em;
    }

    .logo-year {
      font-family: 'Exo', sans-serif;
      font-weight: 900;
      font-size: 14cqi;
      color: var(--blue);
      letter-spacing: 0.01em;
    }

    .logo-stem {
      font-family: 'Exo', sans-serif;
      font-weight: 900;
      font-size: 24cqi;
      line-height: 0.85;
      color: transparent;
      -webkit-text-stroke: 0.22cqi white;
      text-stroke: 0.22cqi white;
      letter-spacing: 0.06em;
      margin-top: -0.05em;
    }

    .logo-bar {
      margin-top: 0.35em;
      background: var(--blue);
      color: white;
      font-family: 'Roboto Mono', monospace;
      font-weight: 500;
      font-size: 2.3cqi;
      letter-spacing: 0.04em;
      padding: 0.4em 1em;
      white-space: nowrap;
    }

    /* ── Bottom UI ── */
    #bottom {
      margin-top: 2.8rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.4rem;
      z-index: 10;
    }

    #tagline {
      font-size: clamp(0.55rem, 1.1vw, 0.72rem);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: transparent;
      transition: color 1s ease;
    }
    #tagline.show { color: rgba(138, 163, 255, 0.82); }

    #skip-hint {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      margin-top: -0.6rem;
      transition: opacity 0.5s ease;
    }
    #skip-hint.hide { opacity: 0; pointer-events: none; }

    #cta {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 0.9rem 2.4rem;
      background: var(--blue);
      color: white;
      border-radius: 0.75rem;
      font-family: 'Exo', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-decoration: none;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.7s ease, transform 0.7s ease,
                  background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 rgba(47, 92, 255, 0);
    }
    #cta.show {
      opacity: 1; transform: translateY(0);
      box-shadow: 0 8px 36px rgba(47, 92, 255, 0.5);
    }
    #cta:hover { background: var(--blue-light); box-shadow: 0 8px 52px rgba(47, 92, 255, 0.65); }

    /* ── Page-out fade ── */
    #fade {
      position: fixed; inset: 0; background: var(--bg);
      opacity: 0; pointer-events: none;
      z-index: 999; transition: opacity 0.55s ease;
    }
    #fade.out { opacity: 1; pointer-events: all; }

    /* ── Reduced-motion: just show the assembled logo immediately ── */
    @media (prefers-reduced-motion: reduce) {
      .piece { transition: none !important; opacity: 1 !important; transform: none !important; }
      #stage { transition: none !important; filter: none !important; }
      #tagline { transition: none !important; color: rgba(138,163,255,0.82) !important; }
      #cta { transition: none !important; opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow" style="width:52rem;height:52rem;top:-22%;right:-18%;background:rgba(47,92,255,0.13)"></div>
<div class="glow" style="width:42rem;height:42rem;bottom:-20%;left:-12%;background:rgba(99,70,255,0.10)"></div>

<canvas id="stars"></canvas>

<div id="intro">
  <div id="stage"><!-- pieces injected by JS --></div>

  <div id="bottom">
    <p id="tagline">2ª edición · CBA Santa Cruz · 30 de junio de 2026</p>
    <p id="skip-hint">Clic o espacio para saltar</p>
    <a id="cta" href="index.html">
      Entrar a la feria
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5-5 5M5 12h13"/>
      </svg>
    </a>
  </div>
</div>

<div id="fade"></div>

<script>
(function () {
  'use strict';

  /* ──────────── Stars ──────────── */
  const cvs = document.getElementById('stars');
  const cx  = cvs.getContext('2d');

  function resizeCvs() { cvs.width = innerWidth; cvs.height = innerHeight; }
  resizeCvs();
  window.addEventListener('resize', resizeCvs);

  const STAR_N = 110;
  const stars = Array.from({ length: STAR_N }, () => ({
    x: Math.random() * 4000,
    y: Math.random() * 3000,
    r: Math.random() * 1.4 + 0.2,
    ph: Math.random() * Math.PI * 2,
    sp: Math.random() * 0.011 + 0.004,
  }));

  let tick = 0;
  (function starLoop() {
    tick++;
    cx.clearRect(0, 0, cvs.width, cvs.height);
    for (const s of stars) {
      const a = (Math.sin(tick * s.sp + s.ph) * 0.42 + 0.58) * 0.72;
      cx.beginPath();
      cx.arc(s.x % cvs.width, s.y % cvs.height, s.r, 0, Math.PI * 2);
      cx.fillStyle = `rgba(168, 200, 255, ${a})`;
      cx.fill();
    }
    requestAnimationFrame(starLoop);
  })();

  /* ──────────── Logo inner HTML ──────────── */
  function logoHTML() {
    return `<div class="logo-inner">
      <div class="logo-row1">
        <span class="logo-feria">FERIA</span>
        <span class="logo-year">2026</span>
      </div>
      <div class="logo-stem">STEM</div>
      <div class="logo-bar">Ciencia - Tecnología - Ingeniería - Matemáticas</div>
    </div>`;
  }

  /* ──────────── Build triangular fragment grid ──────────── */
  const stage  = document.getElementById('stage');
  const COLS   = 5;
  const ROWS   = 3;

  /* Deterministic LCG so scatter positions are consistent */
  let seed = 31;
  function rnd() {
    seed = Math.imul(seed, 1664525) + 1013904223 | 0;
    return (seed >>> 0) / 0xFFFFFFFF;
  }

  function pct(v) { return (v * 100).toFixed(3) + '%'; }

  const pieces = [];

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x0 = pct(c / COLS),       y0 = pct(r / ROWS);
      const x1 = pct((c + 1) / COLS), y1 = pct((r + 1) / ROWS);

      const clips = [
        `polygon(${x0} ${y0}, ${x1} ${y0}, ${x0} ${y1})`,   /* upper triangle */
        `polygon(${x1} ${y0}, ${x1} ${y1}, ${x0} ${y1})`,   /* lower triangle */
      ];

      for (const clip of clips) {
        const el = document.createElement('div');
        el.className = 'piece';
        el.style.clipPath = clip;
        el.innerHTML = logoHTML();

        const tx  = (rnd() - 0.5) * 1100;
        const ty  = (rnd() - 0.5) *  800;
        const rot = (rnd() - 0.5) *  160;
        el.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;

        stage.appendChild(el);
        pieces.push({ el, tx, ty, rot });
      }
    }
  }

  /* ──────────── Assembly sequence ──────────── */
  const STAGGER_MS = 52;   /* delay between each piece starting */
  const PIECE_DUR  = 900;  /* base duration of each piece's flight */
  let   assembled  = false;

  function assemble() {
    if (assembled) return;
    assembled = true;

    document.getElementById('skip-hint').classList.add('hide');

    pieces.forEach(({ el }, i) => {
      const delay = i * STAGGER_MS;
      const dur   = PIECE_DUR + Math.random() * 380;

      setTimeout(() => {
        el.style.transition =
          `transform ${dur}ms cubic-bezier(0.22,1,0.36,1), opacity 220ms ease`;
        el.style.opacity   = '1';
        el.style.transform = 'translate(0,0) rotate(0deg)';
      }, delay);
    });

    const allLanded = pieces.length * STAGGER_MS + PIECE_DUR + 200;

    setTimeout(() => stage.classList.add('glowing'),                          allLanded);
    setTimeout(() => document.getElementById('tagline').classList.add('show'), allLanded + 500);
    setTimeout(() => document.getElementById('cta').classList.add('show'),     allLanded + 1100);
  }

  /* start after brief cinematic pause */
  setTimeout(assemble, 600);

  /* skip on click or keypress */
  function skipHandler() {
    if (!assembled) { assemble(); return; }
    goToMain();
  }
  document.addEventListener('keydown', e => {
    if (['Space','Enter','Escape'].includes(e.code)) skipHandler();
  });
  document.addEventListener('click', e => {
    if (!document.getElementById('cta').contains(e.target)) skipHandler();
  });

  /* ──────────── Page-out transition ──────────── */
  function goToMain() {
    const fade = document.getElementById('fade');
    fade.classList.add('out');
    setTimeout(() => { location.href = 'index.html'; }, 580);
  }

  document.getElementById('cta').addEventListener('click', e => {
    e.preventDefault();
    e.stopPropagation();
    goToMain();
  });

  /* Auto-redirect after 18 seconds if nobody interacts */
  setTimeout(() => {
    if (!document.getElementById('cta').classList.contains('show')) return;
    /* only auto-redirect if CTA is already visible */
    goToMain();
  }, 18000);

})();
</script>

</body>
</html>
